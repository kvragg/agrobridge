name: Semgrep Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Roda toda segunda 06:00 BRT pra pegar regras novas que aparecem
    # depois do PR (Semgrep registry atualiza seguido).
    - cron: "0 9 * * 1"

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Permissões: precisa de pull-requests pra anotar achados em PR.
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    container:
      image: semgrep/semgrep:latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep CE com OWASP + segurança
        run: |
          semgrep ci \
            --config=p/owasp-top-ten \
            --config=p/r2c-security-audit \
            --config=p/javascript \
            --config=p/typescript \
            --config=p/react \
            --config=p/nextjs \
            --config=p/secrets \
            --error \
            --no-suppress-errors \
            --metrics=off \
            --sarif --output=semgrep.sarif
        env:
          # Sem token — Semgrep CE local roda sem cloud account (free).
          SEMGREP_RULES_CACHE_DIR: /tmp/semgrep-cache

      - name: Upload SARIF pra GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
